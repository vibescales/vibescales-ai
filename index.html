<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Vibescale-AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Vibescale AI</h2>
  <textarea id="input" placeholder="Nhập câu hỏi..." rows="3" cols="50"></textarea><br>
  <button id="send">Gửi</button>
  <div id="chat"></div>
  <script>
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");
    const send = document.getElementById("send");
    send.onclick = async () => {
      const message = input.value.trim();
      if (!message) return;
      chat.innerHTML += `<b>Bạn:</b> ${message}<br>`;
      input.value = "";
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        chat.innerHTML += `<b>AI:</b> ${data.reply}<br>`;
        chat.scrollTop = chat.scrollHeight;
      } catch (err) {
        chat.innerHTML += `<b>AI:</b> ❌ Lỗi server!<br>`;
      }
    };
  </script>
</body>
</html>
